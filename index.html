<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ本棚アプリ (Firebase連携版)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f5f7fa; padding: 20px; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .controls { margin-bottom: 30px; }
        input { padding: 8px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; width: 200px; }
        button { padding: 8px 16px; font-size: 16px; background-color: #48bb78; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #38a169; }
        .bookshelf { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .book { width: 120px; height: 180px; background-color: #3182ce; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">Space Débris のマイ本棚</div>
    
    <div class="controls">
        <input type="text" id="bookTitleInput" placeholder="本のタイトルを入力">
        <button id="addBookButton">本棚に追加</button>
    </div>

    <div class="bookshelf" id="bookshelfArea"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // ② 【コピペエリア】あなたのFirebaseの画面に表示されている「firebaseConfig」を、この下に上書き貼り付けしてください

        // ------------------------------------------------------------
        // ① あなたのデータベースの正しい鍵（カンマやカッコを綺麗に整えました）
        const firebaseConfig = {
            apiKey: "AIzaSyAs-dM9E6XpZqgO1D_LpLqXH0W3g0fN8YQ",
            authDomain: "my-bookshelf-app-7670d.firebaseapp.com",
            projectId: "my-bookshelf-app-7670d",
            storageBucket: "my-bookshelf-app-7670d.firebasestorage.app",
            messagingSenderId: "1032338600108",
            appId: "1:1032338600108:web:75734563a620b704e0689b"
        };

        // ② Firebaseとデータベースをそれぞれ1回だけ起動する命令
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // ------------------------------------------------------------

        // 画面のパーツを取得
        const addButton = document.getElementById('addBookButton');
        const titleInput = document.getElementById('bookTitleInput');
        const bookshelf = document.getElementById('bookshelfArea');

        // 🚀 【機能1】データベースからリアルタイムに本を取得して画面に並べる
        // データベースの「books」という引き出しを、登録順（createdAtの古い順）に並び替えて監視する
        const q = query(collection(db, "books"), orderBy("createdAt", "asc"));
        
        // データベースに変化（追加など）があったら、自動的にこの中身が実行される
        onSnapshot(q, (snapshot) => {
            bookshelf.innerHTML = ""; // いったん画面を綺麗にリセット
            
            snapshot.forEach((doc) => {
                const bookData = doc.data();
                
                // データベースから届いた本の名前で、本棚（HTML）を組み立てる
                const newBook = document.createElement('div');
                newBook.className = 'book';
                newBook.textContent = bookData.title;
                bookshelf.appendChild(newBook);
            });
        });

        // 🚀 【機能2】ボタンを押したら、入力された文字をデータベースに送り届ける
        addButton.addEventListener('click', async function() {
            const titleText = titleInput.value;

            if (titleText === "") {
                alert("タイトルを入力してください！");
                return;
            }

            try {
                // データベースの「books」という引き出しに、タイトルと今の時間を保存する
                await addDoc(collection(db, "books"), {
                    title: titleText,
                    createdAt: new Date() // 追加した日時
                });
                
                titleInput.value = ""; // 入力欄を空っぽにする
            } catch (error) {
                console.error("エラーが発生しました: ", error);
                alert("データベースへの保存に失敗しました。ルールがテストモードになっているか確認してください。");
            }
        });
    </script>

</body>
</html>
