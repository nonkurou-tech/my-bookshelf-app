<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ本棚アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f5f7fa; padding: 20px; }
        .header { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .bookshelf { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .book { width: 120px; height: 180px; background-color: #3182ce; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="header">Space Débris のマイ本棚</div>
    <div>119冊の本があります</div>

    <div class="bookshelf">
        <div class="book">刑事訴訟法</div>
        <div class="book">憲法と行政法</div>
        <div class="book">物権法</div>
    </div>

</body>
</html>
